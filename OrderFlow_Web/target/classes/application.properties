spring.application.name=orderflow

# Perfil padrao para facilitar a execucao local sem precisar instalar banco.
# Para usar PostgreSQL, execute com o perfil postgres:
# .\mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=postgres
spring.datasource.url=jdbc:h2:mem:orderflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=always
server.error.include-binding-errors=always

# Porta configurável para deploy em plataformas web.
server.port=${PORT:8080}
